name: Build & scan images

# Container build + supply-chain scan (E01-Th01-S01-T04).
# On PRs: build and scan only — proves the image is buildable and clean, no push.
# On main: additionally push to GHCR and publish the SBOM as a release artifact.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  backend-image:
    name: Backend image — build, SBOM, scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR on main
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Tags: a stable :sha for traceability, plus :edge on main.
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=edge,enable=${{ github.ref == 'refs/heads/main' }}

      # Build once. Load into the local daemon so we can scan the exact bytes
      # before any push. Push happens in a later step, only on main.
      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: code/backend/Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:sha-${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan image (Trivy) — fail on HIGH/CRITICAL
        # v-prefixed tags: the bare `0.x` tags were removed after the March 2026
        # trivy-action tag-compromise incident. Pin to a v-tag (or a SHA).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:sha-${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          # A fixable HIGH/CRITICAL fails the build; unfixable ones are reported
          # but don't wedge delivery on an upstream base-image CVE with no patch.
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload scan results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: sbom.spdx.json
          retention-days: 30

      # ---- push: main only, and only after a clean scan --------------------
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: code/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
