name: Build & scan images

# Container build + supply-chain scan (E01-Th01-S01-T04).
# On PRs: build and scan only — proves the image is buildable and clean, no push.
# On main: additionally push to GHCR and publish the SBOM as an artifact.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-image:
    name: Backend image — build, SBOM, scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR on main
      security-events: write # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR image names MUST be lowercase, but github.repository preserves the
      # repo's original case (this repo is "groFast"). metadata-action lowercases
      # its own tags silently, but any hand-built reference does not — so compute
      # ONE lowercase ref here and use it everywhere. A deterministic :ci-<sha>
      # tag is what the build loads and what SBOM + Trivy scan, so there is no
      # chance of a tag mismatch between build and scan.
      - name: Compute lowercase image ref
        run: |
          repo_lower="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/${repo_lower}/backend" >> "$GITHUB_ENV"
          echo "SCAN_TAG=ghcr.io/${repo_lower}/backend:ci-${{ github.sha }}" >> "$GITHUB_ENV"

      # Build once, load into the local daemon, scan those exact bytes before any
      # push. Push happens later, only on main, only after a clean scan.
      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: code/backend/Dockerfile
          load: true
          tags: ${{ env.SCAN_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.SCAN_TAG }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Human-readable findings in the log — non-failing. Without this, the
      # gating step below (format: sarif) prints nothing, so a failure gives no
      # clue WHICH CVE broke the build. This step always shows them.
      - name: Scan image (Trivy) — report to log
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Scan image (Trivy) — fail on HIGH/CRITICAL
        # v-prefixed tags: the bare `0.x` tags were removed after the March 2026
        # trivy-action tag-compromise incident. Pin to a v-tag (or a SHA).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          # A fixable HIGH/CRITICAL fails the build; unfixable ones are reported
          # but don't wedge delivery on an upstream base-image CVE with no patch.
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload scan results to code scanning
        # Only if Trivy actually produced a report — otherwise this step errors
        # on a missing file and masks the real (earlier) failure.
        if: always() && hashFiles('trivy.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - name: Upload SBOM artifact
        if: always() && hashFiles('sbom.spdx.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: sbom.spdx.json
          retention-days: 30

      # ---- push: main only, and only after a clean scan --------------------
      - name: Derive push tags
        if: github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=edge

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: code/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
